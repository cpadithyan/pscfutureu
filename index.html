<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FutureU PSC Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<!-- Firebase (compat SDK — works with plain <script> tags, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#1B2A4A;
    --green:#1F6F4A;
    --green-dark:#16543A;
    --gold:#C89B3C;
    --paper:#FAF6EC;
    --paper2:#F0E9D8;
    --maroon:#8C2F39;
    --slate:#5B6472;
    --line: rgba(27,42,74,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--gold);color:var(--ink);}

  #app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;background:var(--paper);
    box-shadow:0 0 40px rgba(27,42,74,0.08);}

  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--ink);color:var(--paper);
    padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:3px solid var(--gold);
  }
  .topbar .brand{display:flex;align-items:center;gap:10px;}
  .seal{
    width:30px;height:30px;border-radius:50%;
    border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:700;font-size:13px;color:var(--gold);
    flex-shrink:0;
  }
  .brand-text{line-height:1.15;}
  .brand-text .t1{font-family:'Fraunces',serif;font-weight:700;font-size:15px;}
  .brand-text .t2{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);}
  .roll-chip{
    font-family:'IBM Plex Mono',monospace;font-size:11px;background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);padding:4px 8px;border-radius:20px;color:var(--paper);
  }

  .content{padding:18px 18px 90px 18px;}

  .card{
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;
  }
  .eyebrow{
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--green);font-weight:600;
    margin-bottom:4px;
  }
  .section-title{font-size:19px;font-weight:600;margin:0 0 12px 0;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    background:var(--green);color:#fff;border:none;border-radius:8px;
    padding:12px 18px;font-weight:600;font-size:14px;transition:background .15s;
    width:100%;
  }
  .btn:hover{background:var(--green-dark);}
  .btn.secondary{background:transparent;color:var(--green);border:1.5px solid var(--green);}
  .btn.secondary:hover{background:rgba(31,111,74,0.08);}
  .btn.gold{background:var(--gold);color:var(--ink);}
  .btn.maroon{background:var(--maroon);}
  .btn.small{width:auto;padding:8px 14px;font-size:13px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--slate);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
  .field input, .field select, .field textarea{
    width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;
    background:#fff;color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--green);}

  /* Hall ticket */
  .hall-ticket{
    background:var(--paper2);
    border:1.5px dashed var(--slate);
    border-radius:12px;
    padding:18px;
    position:relative;
    overflow:hidden;
  }
  .hall-ticket::before, .hall-ticket::after{
    content:"";position:absolute;width:18px;height:18px;background:var(--paper);
    border-radius:50%;top:50%;transform:translateY(-50%);
  }
  .hall-ticket::before{left:-9px;}
  .hall-ticket::after{right:-9px;}
  .ht-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .ht-title{font-family:'Fraunces',serif;font-weight:700;font-size:16px;}
  .ht-sub{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);}
  .ht-stamp{
    width:52px;height:52px;border-radius:50%;border:2px solid var(--maroon);color:var(--maroon);
    display:flex;align-items:center;justify-content:center;text-align:center;font-size:9px;font-weight:700;
    transform:rotate(-12deg);letter-spacing:.03em;line-height:1.1;flex-shrink:0;
  }
  .ht-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dotted var(--line);}
  .ht-row:last-child{border-bottom:none;}
  .ht-row .k{color:var(--slate);}
  .ht-row .v{font-weight:600;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}

  /* bottom nav */
  .bottomnav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:520px;
    background:#fff;border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:8px 4px 10px 4px;z-index:30;
  }
  .nav-btn{
    display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
    color:var(--slate);font-size:10px;font-weight:600;padding:4px 6px;border-radius:8px;flex:1;
  }
  .nav-btn.active{color:var(--green);}
  .nav-btn svg{width:20px;height:20px;}

  .category-pill{
    display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    background:var(--paper2);color:var(--green-dark);padding:3px 9px;border-radius:20px;margin-bottom:8px;
  }
  .video-thumb{
    width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#000;margin-bottom:10px;
  }
  .video-thumb iframe{width:100%;height:100%;border:0;}
  .list-item{
    display:flex;align-items:center;justify-content:between;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);
  }
  .list-item:last-child{border-bottom:none;}

  .empty{
    text-align:center;padding:36px 18px;color:var(--slate);
  }
  .empty .display{font-size:16px;margin-bottom:6px;color:var(--ink);}

  .timer-badge{
    font-family:'IBM Plex Mono',monospace;font-weight:600;background:var(--maroon);color:#fff;
    padding:5px 12px;border-radius:20px;font-size:13px;
  }
  .option-row{
    display:flex;align-items:center;gap:10px;padding:12px;border:1.5px solid var(--line);border-radius:8px;
    margin-bottom:8px;transition:.15s;
  }
  .option-row.selected{border-color:var(--green);background:rgba(31,111,74,0.06);}
  .option-row.correct{border-color:var(--green);background:rgba(31,111,74,0.12);}
  .option-row.wrong{border-color:var(--maroon);background:rgba(140,47,57,0.1);}

  .toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;z-index:100;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);max-width:90%;text-align:center;
  }
  .link-row{display:flex;justify-content:space-between;align-items:center;}
  .icon-btn{background:none;border:none;color:var(--maroon);font-size:12px;font-weight:600;padding:4px 8px;}
  .divider{height:1px;background:var(--line);margin:16px 0;}
  .progress-track{height:6px;background:var(--paper2);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
  a{color:var(--green-dark);}
  .qcount{font-size:12px;color:var(--slate);}
  .admin-badge{background:var(--maroon);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;}
  .code-note{font-size:11px;color:var(--slate);background:var(--paper2);border-radius:6px;padding:8px 10px;margin-top:8px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="recaptcha-container"></div>

<script>
/* =========================================================
   FutureU PSC Prep
   Backend: Firebase (Auth — Phone OTP, Firestore — data)
   ========================================================= */

// PASTE your firebaseConfig object from Firebase Console here:
const firebaseConfig = {
  apiKey: "AIzaSyDWuWvG3o0m67T_ec0jTwlPxp_7WxiKiK8",
  authDomain: "pscfutureu.firebaseapp.com",
  projectId: "pscfutureu",
  storageBucket: "pscfutureu.firebasestorage.app",
  messagingSenderId: "807475817443",
  appId: "1:807475817443:web:713a61cd44fe7c39320ed6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_PASSCODE = "FUTUREU2026"; // change this before real use

const KERALA_DISTRICTS = [
  "Thiruvananthapuram","Kollam","Pathanamthitta","Alappuzha","Kottayam",
  "Idukki","Ernakulam","Thrissur","Palakkad","Malappuram",
  "Kozhikode","Wayanad","Kannur","Kasaragod"
];

let state = {
  view: "loading",
  student: null,
  content: { videos: [], pdfs: [], quizzes: [], exams: [] },
  authStep: "phone", // "phone" -> "otp" -> "profile" (profile only for first-time users)
  pendingPhone: null,
  isAdmin: false,
  quizRun: null, // {quiz, idx, answers, submitted}
  examRun: null, // {exam, idx, answers, submitted, endsAt}
  toast: null,
  authError: null,
  loaded: false,
};

const app = document.getElementById("app");

function showToast(msg){
  state.toast = msg;
  render();
  setTimeout(()=>{ state.toast = null; render(); }, 2600);
}

function ytId(input){
  if(!input) return "";
  input = input.trim();
  const m = input.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);
  if(m) return m[1];
  if(/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
  return input;
}

function genRoll(){
  const d = new Date();
  return "FU-" + d.getFullYear().toString().slice(2) + Math.floor(1000+Math.random()*9000);
}
function genOtp(){
  return String(Math.floor(1000+Math.random()*9000));
}
function fmtTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
function uid(){ return Math.random().toString(36).slice(2,9); }

/* ---------- STORAGE (Firestore) ----------
   Collections:
     videos, pdfs, quizzes, exams  -> one doc per item (auto id)
     students                      -> doc id = phone
     results                       -> one doc per attempt, field studentPhone
   Auth/session is handled by Firebase Auth itself (auth.onAuthStateChanged),
   so there's no manual "session:current" key anymore.
*/
async function loadContent(){
  const keys = ["videos","pdfs","quizzes","exams"];
  for(const k of keys){
    try{
      const snap = await db.collection(k).get();
      state.content[k] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }catch(e){
      console.error("loadContent", k, e);
      state.content[k] = [];
    }
  }
}
async function addContentItem(key, item){
  const ref = await db.collection(key).add(item);
  return ref.id;
}
async function deleteContentItem(key, id){
  await db.collection(key).doc(id).delete();
}

async function loadStudent(phone){
  try{
    const doc = await db.collection("students").doc(phone).get();
    return doc.exists ? doc.data() : null;
  }catch(e){ return null; }
}
async function saveStudent(s){
  await db.collection("students").doc(s.phone).set(s);
}
async function getResults(phone){
  try{
    const snap = await db.collection("results")
      .where("studentPhone","==",phone)
      .orderBy("date","desc")
      .limit(50)
      .get();
    return snap.docs.map(d => d.data());
  }catch(e){
    console.error("getResults", e);
    return [];
  }
}
async function pushResult(phone, entry){
  await db.collection("results").add({ ...entry, studentPhone: phone });
}

/* ---------- INIT ---------- */
async function init(){
  await loadContent();
  // Firebase restores the signed-in user automatically on reload.
  auth.onAuthStateChanged(async (user) => {
    if(state.isAdmin) return; // admin flow doesn't use Firebase auth
    if(user && user.phoneNumber){
      const phone = user.phoneNumber.replace(/^\+91/, ""); // stored without country code
      const s = await loadStudent(phone);
      if(s){
        state.student = s;
        state.view = (state.view === "login" || state.view === "loading") ? "home" : state.view;
        render();
        return;
      }
      // Signed in (OTP verified) but no profile saved yet — ask for name/district.
      state.pendingPhone = phone;
      state.authStep = "profile";
      state.view = "login";
      render();
      return;
    }
    if(!state.student){
      state.authStep = "phone";
      state.view = "login";
      render();
    }
  });
}

/* ---------- ACTIONS: AUTH (Firebase Phone OTP) ---------- */
function setupRecaptcha(){
  if(window._recaptchaVerifier) return window._recaptchaVerifier;
  window._recaptchaVerifier = new firebase.auth.RecaptchaVerifier("recaptcha-container", {
    size: "invisible"
  });
  return window._recaptchaVerifier;
}

async function requestOtp(phone){
  if(!/^\d{10}$/.test(phone)){
    showToast("Enter a valid 10-digit phone number");
    return;
  }
  try{
    const verifier = setupRecaptcha();
    const fullNumber = "+91" + phone; // change country code here if needed
    const confirmationResult = await auth.signInWithPhoneNumber(fullNumber, verifier);
    window._confirmationResult = confirmationResult;
    state.pendingPhone = phone;
    state.authStep = "otp";
    render();
    showToast("OTP sent to " + phone);
  }catch(e){
    console.error("requestOtp error", e);
    showToast("Couldn't send OTP: " + (e.message || e.code || "try again"));
    try{
      if(window._recaptchaVerifier){
        const id = await window._recaptchaVerifier.render();
        grecaptcha.reset(id);
      }
    }catch(err){ /* ignore */ }
  }
}

async function verifyOtp(entered){
  if(!window._confirmationResult){ showToast("Request an OTP first"); return; }
  if(!entered){ showToast("Enter the OTP code"); return; }
  try{
    await window._confirmationResult.confirm(entered);
    // onAuthStateChanged (in init) will fire from here and decide
    // whether to go to "home" (existing student) or "profile" (new student).
  }catch(e){
    console.error("verifyOtp error", e);
    showToast("Incorrect code, try again");
  }
}

async function completeProfile(name, district){
  name = name.trim();
  if(!name || !district){
    showToast("Enter your name and select your district");
    return;
  }
  const phone = state.pendingPhone;
  const student = { name, place: district, phone, rollNumber: genRoll(), joinedAt: new Date().toISOString() };
  await saveStudent(student);
  state.student = student;
  state.pendingPhone = null;
  state.authStep = "phone";
  state.view = "home";
  render();
}

async function logout(){
  await auth.signOut();
  state.student = null;
  state.pendingPhone = null;
  state.authStep = "phone";
  state.view = "login";
  state.isAdmin = false;
  render();
}

/* ---------- RENDER SHELL ---------- */
function render(){
  let body = "";
  if(state.view === "loading"){
    body = `<div class="content"><p>Loading…</p></div>`;
    app.innerHTML = body;
    return;
  }
  if(state.view === "login"){
    app.innerHTML = renderLogin();
    bindLogin();
    return;
  }

  const nav = renderBottomNav();
  let inner = "";
  if(state.view === "home") inner = renderHome();
  else if(state.view === "videos") inner = renderVideos();
  else if(state.view === "pdfs") inner = renderPdfs();
  else if(state.view === "quiz") inner = renderQuizList();
  else if(state.view === "quizTake") inner = renderQuizTake();
  else if(state.view === "exam") inner = renderExamList();
  else if(state.view === "examTake") inner = renderExamTake();
  else if(state.view === "profile") inner = renderProfile();
  else if(state.view === "admin") inner = renderAdmin();

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="seal">FU</div>
        <div class="brand-text">
          <div class="t1">FutureU PSC Prep</div>
          <div class="t2">${state.view === 'admin' ? 'Admin panel' : (state.student ? state.student.place : '')}</div>
        </div>
      </div>
      ${state.student ? `<div class="roll-chip">${state.student.rollNumber}</div>` : ""}
    </div>
    <div class="content">${inner}</div>
    ${state.toast ? `<div class="toast">${state.toast}</div>` : ""}
    ${nav}
  `;
  bindViewEvents();
}

function renderBottomNav(){
  const items = [
    {v:"home", label:"Home", icon:"M3 11l9-8 9 8v9a2 2 0 01-2 2H5a2 2 0 01-2-2v-9z"},
    {v:"videos", label:"Videos", icon:"M15 10l4.55-2.27A1 1 0 0121 8.62v6.76a1 1 0 01-1.45.9L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"},
    {v:"pdfs", label:"PDFs", icon:"M7 21h10a2 2 0 002-2V9l-6-6H7a2 2 0 00-2 2v14a2 2 0 002 2z"},
    {v:"quiz", label:"Quiz", icon:"M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"},
    {v:"exam", label:"Mock Exam", icon:"M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"},
    {v:"profile", label:"Profile", icon:"M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"},
  ];
  return `<div class="bottomnav">
    ${items.map(it => `
      <button class="nav-btn ${state.view===it.v?'active':''}" data-nav="${it.v}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${it.icon}"/></svg>
        <span>${it.label}</span>
      </button>`).join("")}
  </div>`;
}

/* ---------- LOGIN VIEW ---------- */
function renderLogin(){
  const step = state.authStep;
  return `
  <div class="content" style="padding-top:40px;">
    <div style="text-align:center;margin-bottom:26px;">
      <div class="seal" style="width:48px;height:48px;font-size:18px;margin:0 auto 10px auto;">FU</div>
      <h1 style="margin:0;font-size:24px;">FutureU PSC Prep</h1>
      <div class="eyebrow" style="margin-top:6px;">Karuvarakundu &middot; Tuvvur</div>
    </div>

    <div class="hall-ticket" style="margin-bottom:20px;">
      <div class="ht-head">
        <div>
          <div class="ht-sub">${step === "profile" ? "One last step" : "Student login"}</div>
          <div class="ht-title">Admit Card — Study Portal</div>
        </div>
        <div class="ht-stamp">FUTUREU<br/>VERIFIED</div>
      </div>
      <div class="ht-row"><span class="k">Access</span><span class="v">Video &middot; PDF &middot; Quiz &middot; Exam</span></div>
      <div class="ht-row"><span class="k">Login</span><span class="v">Phone + OTP</span></div>
    </div>

    ${step === "phone" ? `
      <div class="card">
        <div class="field"><label>Phone number</label><input id="reg-phone" inputmode="numeric" maxlength="10" placeholder="10-digit mobile number"/></div>
        <button class="btn" id="btn-send-otp">Send OTP</button>
      </div>
    ` : ""}

    ${step === "otp" ? `
      <div class="card">
        <div class="eyebrow">OTP sent to ${state.pendingPhone}</div>
        <div class="field" style="margin-top:10px;"><label>Enter the OTP</label><input id="otp-input" inputmode="numeric" maxlength="6" placeholder="Code from SMS"/></div>
        <button class="btn" id="btn-verify-otp" style="margin-top:12px;">Verify &amp; enter</button>
        <button class="btn secondary" id="btn-cancel-otp" style="margin-top:8px;">Use a different number</button>
      </div>
    ` : ""}

    ${step === "profile" ? `
      <div class="card">
        <div class="eyebrow" style="margin-bottom:10px;">Number verified — tell us a bit about you</div>
        <div class="field"><label>Full name</label><input id="prof-name" placeholder="e.g. Anjali K"/></div>
        <div class="field">
          <label>District</label>
          <select id="prof-district">
            <option value="" disabled selected>Select your district</option>
            ${KERALA_DISTRICTS.map(d => `<option value="${d}">${d}</option>`).join("")}
          </select>
        </div>
        <button class="btn" id="btn-complete-profile">Continue to home</button>
      </div>
    ` : ""}

    ${step === "phone" ? `
      <p style="text-align:center;font-size:12px;color:var(--slate);margin-top:18px;">
        Are you an admin? <a href="#" id="admin-link">Open admin login</a>
      </p>
    ` : ""}
  </div>`;
}
function bindLogin(){
  const send = document.getElementById("btn-send-otp");
  if(send) send.onclick = () => requestOtp(document.getElementById("reg-phone").value.trim());

  const verify = document.getElementById("btn-verify-otp");
  if(verify) verify.onclick = () => verifyOtp(document.getElementById("otp-input").value.trim());

  const cancel = document.getElementById("btn-cancel-otp");
  if(cancel) cancel.onclick = () => { state.authStep = "phone"; state.pendingPhone = null; render(); };

  const completeBtn = document.getElementById("btn-complete-profile");
  if(completeBtn) completeBtn.onclick = () => completeProfile(
    document.getElementById("prof-name").value,
    document.getElementById("prof-district").value

function emptyState(title, sub){

/* ---------- EVENT BINDING ---------- */
function bindViewEvents(){
  document.querySelectorAll("[data-nav]").forEach(el => {
    el.onclick = () => { state.view = el.getAttribute("data-nav"); render(); if(state.view==="profile") loadProfileResults(); };
  });

  const logoutBtn = document.getElementById("btn-logout");
  if(logoutBtn) logoutBtn.onclick = logout;
  if(state.view === "profile") loadProfileResults();

  /* quiz start */
  document.querySelectorAll("[data-start-quiz]").forEach(el=>{
    el.onclick = () => {
      const id = el.getAttribute("data-start-quiz");
      const quiz = state.content.quizzes.find(q=>q.id===id);
      state.quizRun = { quiz, idx:0, answers:{}, submitted:false };
      state.view = "quizTake";
      render();
    };
  });
  document.querySelectorAll("[data-select-opt]").forEach(el=>{
    el.onclick = () => {
      state.quizRun.answers[state.quizRun.idx] = parseInt(el.getAttribute("data-select-opt"));
      render();
    };
  });
  const qNext = document.querySelector("[data-quiz-next]");
  if(qNext) qNext.onclick = () => { state.quizRun.idx++; render(); };
  const qPrev = document.querySelector("[data-quiz-prev]");
  if(qPrev) qPrev.onclick = () => { state.quizRun.idx--; render(); };
  const qSubmit = document.querySelector("[data-quiz-submit]");
  if(qSubmit) qSubmit.onclick = async () => {
    state.quizRun.submitted = true;
    const { quiz, answers } = state.quizRun;
    let score = 0;
    quiz.questions.forEach((q,i)=>{ if(answers[i]===q.correctIndex) score++; });
    await pushResult(state.student.phone, { title: quiz.title, type:"Quiz", score, total: quiz.questions.length, date: new Date().toISOString() });
    render();
  };

  /* exam start */
  document.querySelectorAll("[data-start-exam]").forEach(el=>{
    el.onclick = () => {
      const id = el.getAttribute("data-start-exam");
      const exam = state.content.exams.find(e=>e.id===id);
      state.examRun = { exam, idx:0, answers:{}, submitted:false, endsAt: Date.now() + exam.durationMinutes*60000 };
      state.view = "examTake";
      render();
      startExamTimer();
    };
  });
  document.querySelectorAll("[data-select-eopt]").forEach(el=>{
    el.onclick = () => {
      state.examRun.answers[state.examRun.idx] = parseInt(el.getAttribute("data-select-eopt"));
      render();
    };
  });
  const eNext = document.querySelector("[data-exam-next]");
  if(eNext) eNext.onclick = () => { state.examRun.idx++; render(); };
  const ePrev = document.querySelector("[data-exam-prev]");
  if(ePrev) ePrev.onclick = () => { state.examRun.idx--; render(); };
  const eSubmit = document.querySelector("[data-exam-submit]");
  if(eSubmit) eSubmit.onclick = () => submitExam();

  if(state.view === "examTake" && state.examRun && !state.examRun.submitted){
    startExamTimer();
  }

  /* admin */
  bindAdminEvents();
}

let examTimerInterval = null;
function startExamTimer(){
  if(examTimerInterval) clearInterval(examTimerInterval);
  examTimerInterval = setInterval(()=>{
    if(!state.examRun || state.examRun.submitted){ clearInterval(examTimerInterval); return; }
    const remaining = Math.max(0, Math.round((state.examRun.endsAt - Date.now())/1000));
    const badge = document.getElementById("exam-timer");
    if(badge) badge.textContent = fmtTime(remaining);
    if(remaining <= 0){
      clearInterval(examTimerInterval);
      submitExam();
    }
  }, 1000);
}
async function submitExam(){
  if(!state.examRun || state.examRun.submitted) return;
  state.examRun.submitted = true;
  const { exam, answers } = state.examRun;
  let score = 0;
  exam.questions.forEach((q,i)=>{ if(answers[i]===q.correctIndex) score++; });
  await pushResult(state.student.phone, { title: exam.title, type:"Mock exam", score, total: exam.questions.length, date: new Date().toISOString() });
  render();
}

function bindAdminEvents(){
  if(state.view !== "admin") return;

  const exitBtn = document.getElementById("a-exit");
  if(exitBtn) exitBtn.onclick = () => { state.isAdmin = false; state.student = null; state.view = "login"; render(); };

  const vAdd = document.getElementById("a-v-add");
  if(vAdd) vAdd.onclick = async () => {
    const title = document.getElementById("a-v-title").value.trim();
    const cat = document.getElementById("a-v-cat").value.trim();
    const url = document.getElementById("a-v-url").value.trim();
    const desc = document.getElementById("a-v-desc").value.trim();
    if(!title || !url){ showToast("Title and video URL are required"); return; }
    await addContentItem("videos", { title, category: cat, url, description: desc });
    await loadContent();
    showToast("Video added");
    render();
  };

  const pAdd = document.getElementById("a-p-add");
  if(pAdd) pAdd.onclick = async () => {
    const title = document.getElementById("a-p-title").value.trim();
    const cat = document.getElementById("a-p-cat").value.trim();
    const url = document.getElementById("a-p-url").value.trim();
    if(!title || !url){ showToast("Title and file link are required"); return; }
    await addContentItem("pdfs", { title, category: cat, url });
    await loadContent();
    showToast("PDF added");
    render();
  };

  /* quiz builder */
  const qAddQ = document.getElementById("a-q-addq");
  if(qAddQ){
    if(document.getElementById("a-q-questions").children.length===0 && qBuilder.length===0){}
    qAddQ.onclick = () => { qBuilder.push({ q:"", options:["","","",""], correctIndex:0 }); renderQuestionBuilder(qBuilder,"a-q-questions"); rebindBuilder("a-q-questions", qBuilder); };
    renderQuestionBuilder(qBuilder, "a-q-questions");
    rebindBuilder("a-q-questions", qBuilder);
  }
  const qSave = document.getElementById("a-q-save");
  if(qSave) qSave.onclick = async () => {
    const title = document.getElementById("a-q-title").value.trim();
    const cat = document.getElementById("a-q-cat").value.trim();
    const valid = qBuilder.filter(q=>q.q && q.options.every(o=>o));
    if(!title || !valid.length){ showToast("Add a title and at least one complete question"); return; }
    await addContentItem("quizzes", { title, category: cat, questions: valid });
    await loadContent();
    qBuilder = [];
    showToast("Quiz saved");
    render();
  };

  /* exam builder */
  const eAddQ = document.getElementById("a-e-addq");
  if(eAddQ){
    eAddQ.onclick = () => { eBuilder.push({ q:"", options:["","","",""], correctIndex:0 }); renderQuestionBuilder(eBuilder,"a-e-questions"); rebindBuilder("a-e-questions", eBuilder); };
    renderQuestionBuilder(eBuilder, "a-e-questions");
    rebindBuilder("a-e-questions", eBuilder);
  }
  const eSave = document.getElementById("a-e-save");
  if(eSave) eSave.onclick = async () => {
    const title = document.getElementById("a-e-title").value.trim();
    const cat = document.getElementById("a-e-cat").value.trim();
    const dur = parseInt(document.getElementById("a-e-dur").value) || 30;
    const valid = eBuilder.filter(q=>q.q && q.options.every(o=>o));
    if(!title || !valid.length){ showToast("Add a title and at least one complete question"); return; }
    await addContentItem("exams", { title, category: cat, durationMinutes: dur, questions: valid });
    await loadContent();
    eBuilder = [];
    showToast("Mock exam saved");
    render();
  };

  /* delete existing content */
  document.querySelectorAll("[data-del]").forEach(el=>{
    el.onclick = async () => {
      const [key, id] = el.getAttribute("data-del").split(":");
      await deleteContentItem(key, id);
      await loadContent();
      showToast("Removed");
      render();
    };
  });
}

function rebindBuilder(containerId, list){
  document.querySelectorAll(`#${containerId} .qb-q`).forEach(el=>{
    el.oninput = () => { list[parseInt(el.getAttribute("data-i"))].q = el.value; };
  });
  document.querySelectorAll(`#${containerId} .qb-opt`).forEach(el=>{
    el.oninput = () => {
      const i = parseInt(el.getAttribute("data-i")), oi = parseInt(el.getAttribute("data-oi"));
      list[i].options[oi] = el.value;
    };
  });
  document.querySelectorAll(`#${containerId} [data-correct]`).forEach(el=>{
    el.onclick = () => {
      const [i,oi] = el.getAttribute("data-correct").split(":").map(Number);
      list[i].correctIndex = oi;
      renderQuestionBuilder(list, containerId);
      rebindBuilder(containerId, list);
    };
  });
  document.querySelectorAll(`#${containerId} [data-rmq]`).forEach(el=>{
    el.onclick = () => {
      const i = parseInt(el.getAttribute("data-rmq"));
      list.splice(i,1);
      renderQuestionBuilder(list, containerId);
      rebindBuilder(containerId, list);
    };
  });
}

init();
</script>
</body>
</html>
